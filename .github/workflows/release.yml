name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
          - runner: macos-14
            goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: go.mod

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          go mod edit -dropreplace github.com/webforspeed/bono-core || true
          go mod edit -require=github.com/webforspeed/bono-core@${TAG}
          go mod download all

          version="${TAG#v}"
          artifact="bono_${version}_${GOOS}_${GOARCH}"
          mkdir -p dist

          go build -trimpath -ldflags="-s -w -X main.version=${TAG}" -o dist/bono .
          tar -C dist -czf "dist/${artifact}.tar.gz" bono
          rm -f dist/bono

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate and sign checksums
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > checksums.txt
          echo "$RELEASE_SIGNING_KEY" > /tmp/signing.key
          openssl pkeyutl -sign -inkey /tmp/signing.key \
            -rawin -in checksums.txt -out checksums.txt.sig
          rm -f /tmp/signing.key

      - name: Attest build provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: dist/*.tar.gz

      - name: Create release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/checksums.txt.sig
          generate_release_notes: true
